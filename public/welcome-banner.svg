<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B"/>
      <stop offset="50%" style="stop-color:#FF8E53"/>
      <stop offset="100%" style="stop-color:#FFC371"/>
    </linearGradient>
    <linearGradient id="circle1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="circle2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="680" cy="80" r="180" fill="url(#circle1)"/>
  <circle cx="120" cy="380" r="150" fill="url(#circle2)"/>
  <circle cx="720" cy="360" r="100" fill="url(#circle1)"/>

  <!-- Small dots decoration -->
  <circle cx="100" cy="100" r="4" fill="white" opacity="0.3"/>
  <circle cx="160" cy="60" r="3" fill="white" opacity="0.2"/>
  <circle cx="680" cy="300" r="5" fill="white" opacity="0.25"/>
  <circle cx="620" cy="380" r="3" fill="white" opacity="0.2"/>
  <circle cx="200" cy="320" r="4" fill="white" opacity="0.15"/>

  <!-- Icon circle -->
  <circle cx="400" cy="155" r="48" fill="white" opacity="0.2"/>
  <circle cx="400" cy="155" r="36" fill="white" opacity="0.25"/>
  <!-- Heart + pulse icon -->
  <text x="400" y="168" font-size="32" text-anchor="middle" fill="white">🫀</text>

  <!-- Main title -->
  <text x="400" y="250" font-family="Georgia, serif" font-size="36" font-weight="bold" text-anchor="middle" fill="white">Навигатор самочувствия</text>

  <!-- Subtitle -->
  <text x="400" y="295" font-family="-apple-system, Arial, sans-serif" font-size="18" text-anchor="middle" fill="white" opacity="0.9">Узнай, что стоит за твоими симптомами</text>

  <!-- Divider line -->
  <rect x="340" y="316" width="120" height="2" rx="1" fill="white" opacity="0.4"/>

  <!-- Features row -->
  <text x="210" y="355" font-family="-apple-system, Arial, sans-serif" font-size="14" text-anchor="middle" fill="white" opacity="0.85">3 шага</text>
  <text x="210" y="375" font-family="-apple-system, Arial, sans-serif" font-size="13" text-anchor="middle" fill="white" opacity="0.65">быстро и просто</text>

  <text x="400" y="355" font-family="-apple-system, Arial, sans-serif" font-size="14" text-anchor="middle" fill="white" opacity="0.85">Бесплатно</text>
  <text x="400" y="375" font-family="-apple-system, Arial, sans-serif" font-size="13" text-anchor="middle" fill="white" opacity="0.65">без обязательств</text>

  <text x="590" y="355" font-family="-apple-system, Arial, sans-serif" font-size="14" text-anchor="middle" fill="white" opacity="0.85">Живой специалист</text>
  <text x="590" y="375" font-family="-apple-system, Arial, sans-serif" font-size="13" text-anchor="middle" fill="white" opacity="0.65">не алгоритм</text>

  <!-- Vertical separators -->
  <rect x="300" y="345" width="1" height="40" fill="white" opacity="0.25"/>
  <rect x="500" y="345" width="1" height="40" fill="white" opacity="0.25"/>
</svg>
