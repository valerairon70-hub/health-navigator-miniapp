<svg width="640" height="360" viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2e2e1e"/>
      <stop offset="100%" style="stop-color:#4a4a30"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="640" height="360" fill="url(#bgGrad)"/>

  <!-- Subtle glow circles -->
  <circle cx="560" cy="40" r="200" fill="#7a9a4a" opacity="0.06"/>
  <circle cx="80" cy="320" r="180" fill="#7a9a4a" opacity="0.06"/>

  <!-- Left accent line -->
  <rect x="56" y="72" width="3" height="216" rx="2" fill="#a0b468" opacity="0.7"/>

  <!-- Health pulse icon -->
  <circle cx="104" cy="128" r="32" fill="#ffffff" opacity="0.06"/>
  <polyline points="82,128 93,128 99,110 112,146 118,128 128,128"
    fill="none" stroke="#a0b468" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Main title -->
  <text x="152" y="115" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="bold" fill="#f5f5f0">Навигатор</text>
  <text x="152" y="151" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="bold" fill="#f5f5f0">самочувствия</text>

  <!-- Tagline -->
  <text x="152" y="178" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#f5f5f0" opacity="0.5">Узнай главную причину симптома — за 2 минуты</text>

  <!-- Divider -->
  <rect x="56" y="204" width="528" height="1" fill="#ffffff" opacity="0.08"/>

  <!-- Feature 1 -->
  <circle cx="136" cy="246" r="20" fill="#a0b468" opacity="0.12"/>
  <text x="136" y="252" font-family="Arial, sans-serif" font-size="17" font-weight="bold" text-anchor="middle" fill="#a0b468">3</text>
  <text x="136" y="276" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#f5f5f0">вопроса</text>
  <text x="136" y="294" font-family="Arial, Helvetica, sans-serif" font-size="11" text-anchor="middle" fill="#f5f5f0" opacity="0.4">2 минуты</text>

  <!-- Separator -->
  <rect x="214" y="232" width="1" height="70" fill="#ffffff" opacity="0.1"/>

  <!-- Feature 2 -->
  <circle cx="320" cy="246" r="20" fill="#a0b468" opacity="0.12"/>
  <polyline points="310,246 317,253 330,239" fill="none" stroke="#a0b468" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="320" y="276" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#f5f5f0">Бесплатно</text>
  <text x="320" y="294" font-family="Arial, Helvetica, sans-serif" font-size="11" text-anchor="middle" fill="#f5f5f0" opacity="0.4">без обязательств</text>

  <!-- Separator -->
  <rect x="426" y="232" width="1" height="70" fill="#ffffff" opacity="0.1"/>

  <!-- Feature 3 -->
  <circle cx="504" cy="246" r="20" fill="#a0b468" opacity="0.12"/>
  <circle cx="504" cy="241" r="6" fill="none" stroke="#a0b468" stroke-width="2"/>
  <path d="M493,258 Q504,253 515,258" fill="none" stroke="#a0b468" stroke-width="2" stroke-linecap="round"/>
  <text x="504" y="276" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#f5f5f0">Живой эксперт</text>
  <text x="504" y="294" font-family="Arial, Helvetica, sans-serif" font-size="11" text-anchor="middle" fill="#f5f5f0" opacity="0.4">реальный человек</text>

  <!-- Bottom CTA -->
  <rect x="56" y="320" width="528" height="28" rx="8" fill="#a0b468" opacity="0.14"/>
  <text x="320" y="339" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#f5f5f0" opacity="0.8" letter-spacing="0.3">Нажми «Открыть навигатор», чтобы начать</text>
</svg>
