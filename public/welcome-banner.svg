<svg width="640" height="360" viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B"/>
      <stop offset="50%" style="stop-color:#FF8E53"/>
      <stop offset="100%" style="stop-color:#FFC371"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="30"/></filter>
  </defs>

  <rect width="640" height="360" fill="url(#bg)"/>

  <!-- Blobs -->
  <circle cx="560" cy="60" r="150" fill="white" opacity="0.08" filter="url(#blur1)"/>
  <circle cx="80" cy="300" r="120" fill="white" opacity="0.08" filter="url(#blur1)"/>

  <!-- Icon -->
  <circle cx="320" cy="90" r="44" fill="white" opacity="0.15"/>
  <circle cx="320" cy="90" r="32" fill="white" opacity="0.18"/>
  <text x="320" y="107" font-size="36" text-anchor="middle" fill="white">🫀</text>

  <!-- Title -->
  <text x="320" y="168" font-family="Georgia, serif" font-size="40" font-weight="bold" text-anchor="middle" fill="white">Навигатор самочувствия</text>

  <!-- Tagline -->
  <text x="320" y="205" font-family="-apple-system, Arial, sans-serif" font-size="18" text-anchor="middle" fill="white" opacity="0.9">Узнай, что стоит за твоими симптомами — за 3 шага</text>

  <!-- Divider -->
  <rect x="260" y="222" width="120" height="1.5" rx="1" fill="white" opacity="0.35"/>

  <!-- 3 features -->
  <text x="130" y="255" font-size="20" text-anchor="middle" fill="white">⚡</text>
  <text x="130" y="278" font-family="-apple-system, Arial, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="white">3 шага</text>
  <text x="130" y="296" font-family="-apple-system, Arial, sans-serif" font-size="12" text-anchor="middle" fill="white" opacity="0.75">быстро и просто</text>

  <text x="320" y="255" font-size="20" text-anchor="middle" fill="white">🎁</text>
  <text x="320" y="278" font-family="-apple-system, Arial, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="white">Бесплатно</text>
  <text x="320" y="296" font-family="-apple-system, Arial, sans-serif" font-size="12" text-anchor="middle" fill="white" opacity="0.75">без обязательств</text>

  <text x="510" y="255" font-size="20" text-anchor="middle" fill="white">🙋</text>
  <text x="510" y="278" font-family="-apple-system, Arial, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="white">Не бот</text>
  <text x="510" y="296" font-family="-apple-system, Arial, sans-serif" font-size="12" text-anchor="middle" fill="white" opacity="0.75">реальный человек</text>

  <!-- CTA -->
  <rect x="160" y="318" width="320" height="34" rx="12" fill="white" opacity="0.18"/>
  <text x="320" y="341" font-family="-apple-system, Arial, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="white">Нажми «Открыть навигатор» 👇</text>
</svg>
