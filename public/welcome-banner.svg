<svg width="600" height="900" viewBox="0 0 600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B"/>
      <stop offset="50%" style="stop-color:#FF8E53"/>
      <stop offset="100%" style="stop-color:#FFC371"/>
    </linearGradient>
    <linearGradient id="blob1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="blob2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="900" fill="url(#bg)"/>

  <!-- Soft blobs -->
  <circle cx="520" cy="120" r="220" fill="url(#blob1)" filter="url(#blur1)"/>
  <circle cx="80" cy="780" r="200" fill="url(#blob2)" filter="url(#blur1)"/>

  <!-- Icon area -->
  <circle cx="300" cy="220" r="80" fill="white" opacity="0.15"/>
  <circle cx="300" cy="220" r="58" fill="white" opacity="0.2"/>
  <text x="300" y="244" font-size="52" text-anchor="middle" fill="white">🫀</text>

  <!-- Main title -->
  <text x="300" y="360" font-family="Georgia, serif" font-size="48" font-weight="bold" text-anchor="middle" fill="white">Навигатор</text>
  <text x="300" y="418" font-family="Georgia, serif" font-size="48" font-weight="bold" text-anchor="middle" fill="white">самочувствия</text>

  <!-- Tagline -->
  <text x="300" y="488" font-family="-apple-system, Arial, sans-serif" font-size="22" text-anchor="middle" fill="white" opacity="0.9">Узнай, что стоит за твоими</text>
  <text x="300" y="518" font-family="-apple-system, Arial, sans-serif" font-size="22" text-anchor="middle" fill="white" opacity="0.9">симптомами — за 3 шага</text>

  <!-- Divider -->
  <rect x="230" y="554" width="140" height="2" rx="1" fill="white" opacity="0.35"/>

  <!-- Feature cards -->
  <!-- Card 1 -->
  <rect x="40" y="580" width="155" height="100" rx="16" fill="white" opacity="0.15"/>
  <text x="117" y="622" font-family="-apple-system, Arial, sans-serif" font-size="28" text-anchor="middle" fill="white">⚡</text>
  <text x="117" y="652" font-family="-apple-system, Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">3 шага</text>
  <text x="117" y="672" font-family="-apple-system, Arial, sans-serif" font-size="13" text-anchor="middle" fill="white" opacity="0.75">быстро и просто</text>

  <!-- Card 2 -->
  <rect x="222" y="580" width="155" height="100" rx="16" fill="white" opacity="0.15"/>
  <text x="299" y="622" font-family="-apple-system, Arial, sans-serif" font-size="28" text-anchor="middle" fill="white">🎁</text>
  <text x="299" y="652" font-family="-apple-system, Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">Бесплатно</text>
  <text x="299" y="672" font-family="-apple-system, Arial, sans-serif" font-size="13" text-anchor="middle" fill="white" opacity="0.75">без обязательств</text>

  <!-- Card 3 -->
  <rect x="404" y="580" width="155" height="100" rx="16" fill="white" opacity="0.15"/>
  <text x="481" y="622" font-family="-apple-system, Arial, sans-serif" font-size="28" text-anchor="middle" fill="white">🙋</text>
  <text x="481" y="652" font-family="-apple-system, Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">Живой</text>
  <text x="481" y="672" font-family="-apple-system, Arial, sans-serif" font-size="13" text-anchor="middle" fill="white" opacity="0.75">специалист</text>

  <!-- Bottom CTA hint -->
  <rect x="100" y="730" width="400" height="70" rx="20" fill="white" opacity="0.18"/>
  <text x="300" y="768" font-family="-apple-system, Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="white">Нажми «Открыть навигатор»</text>
  <text x="300" y="792" font-family="-apple-system, Arial, sans-serif" font-size="15" text-anchor="middle" fill="white" opacity="0.8">и пройди бесплатный разбор</text>

  <!-- Small dots decoration -->
  <circle cx="60" cy="160" r="5" fill="white" opacity="0.2"/>
  <circle cx="100" cy="100" r="3" fill="white" opacity="0.15"/>
  <circle cx="530" cy="700" r="5" fill="white" opacity="0.2"/>
  <circle cx="560" cy="760" r="3" fill="white" opacity="0.15"/>
</svg>
