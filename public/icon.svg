<svg xmlns="http://www.w3.org/2000/svg" width="640" height="640" viewBox="0 0 640 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="routeLine" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
    <linearGradient id="pinTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <linearGradient id="pinBot" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f87171"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="640" height="640" rx="128" fill="url(#bg)"/>

  <!-- Map grid lines (subtle) -->
  <g opacity="0.07" stroke="#818cf8" stroke-width="1">
    <line x1="0" y1="160" x2="640" y2="160"/>
    <line x1="0" y1="320" x2="640" y2="320"/>
    <line x1="0" y1="480" x2="640" y2="480"/>
    <line x1="160" y1="0" x2="160" y2="640"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/>
  </g>

  <!-- Map road shapes (background decoration) -->
  <g opacity="0.1" stroke="#6366f1" stroke-width="3" fill="none">
    <path d="M80 400 Q200 380 260 300 Q320 220 400 260 Q460 290 520 240"/>
    <path d="M100 500 Q180 460 240 420 Q310 375 350 310"/>
    <path d="M420 500 Q460 440 490 380 Q520 330 550 290"/>
  </g>

  <!-- Route path (main glowing line) -->
  <path d="M320 540 C280 500 220 460 240 400 C260 340 340 330 320 270 C300 210 240 190 280 140 C300 115 320 108 320 108"
    fill="none" stroke="url(#routeLine)" stroke-width="8" stroke-linecap="round" stroke-dasharray="12 6"
    filter="url(#glow)" opacity="0.9"/>

  <!-- Solid route underneath for depth -->
  <path d="M320 540 C280 500 220 460 240 400 C260 340 340 330 320 270 C300 210 240 190 280 140 C300 115 320 108 320 108"
    fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-dasharray="12 6" opacity="0.15"/>

  <!-- BOTTOM PIN — "Нет сил" (point A) -->
  <g filter="url(#softglow)">
    <circle cx="320" cy="548" r="32" fill="url(#pinBot)" opacity="0.95"/>
    <circle cx="320" cy="548" r="24" fill="#1e1b4b"/>
    <!-- Battery empty icon -->
    <rect x="308" y="539" width="18" height="12" rx="2" fill="#f87171" stroke="#f87171" stroke-width="1"/>
    <rect x="326" y="542" width="3" height="6" rx="1" fill="#f87171"/>
    <!-- Empty battery fill -->
    <rect x="310" y="541" width="3" height="8" rx="1" fill="#f87171" opacity="0.5"/>
  </g>
  <!-- Label A -->
  <text x="320" y="596" font-family="system-ui, sans-serif" font-size="20" font-weight="700"
    fill="#f87171" text-anchor="middle" opacity="0.9">нет сил</text>

  <!-- TOP PIN — "Энергия" (point B) -->
  <g filter="url(#softglow)">
    <circle cx="320" cy="96" r="32" fill="url(#pinTop)" opacity="0.95"/>
    <circle cx="320" cy="96" r="24" fill="#1e1b4b"/>
    <!-- Lightning bolt (energy) -->
    <path d="M323 78 L314 98 L321 98 L317 114 L326 94 L319 94 Z"
      fill="#4ade80" stroke="none"/>
  </g>
  <!-- Label B -->
  <text x="320" y="46" font-family="system-ui, sans-serif" font-size="20" font-weight="700"
    fill="#4ade80" text-anchor="middle" opacity="0.9">энергия</text>

  <!-- Middle waypoint dot -->
  <circle cx="320" cy="322" r="10" fill="#a855f7" opacity="0.9" filter="url(#glow)"/>
  <circle cx="320" cy="322" r="5" fill="white" opacity="0.8"/>

</svg>
