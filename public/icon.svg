<svg xmlns="http://www.w3.org/2000/svg" width="640" height="640" viewBox="0 0 640 640">
  <defs>
    <!-- Deep teal radial background -->
    <radialGradient id="bg" cx="50%" cy="45%" r="60%">
      <stop offset="0%" style="stop-color:#0e7a6a"/>
      <stop offset="100%" style="stop-color:#042f28"/>
    </radialGradient>
    <!-- Compass needle gradient -->
    <linearGradient id="needle" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5a623"/>
      <stop offset="45%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#4dd9c0"/>
    </linearGradient>
    <!-- Amber glow -->
    <radialGradient id="amberGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffd166" stop-opacity="1"/>
      <stop offset="100%" style="stop-color:#f5a623" stop-opacity="0.6"/>
    </radialGradient>
    <!-- Outer ring gradient -->
    <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4dd9c0" stop-opacity="0.6"/>
      <stop offset="100%" style="stop-color:#0e7a6a" stop-opacity="0.1"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="ambientGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="starGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="320" cy="320" r="320" fill="url(#bg)"/>

  <!-- Subtle outer ring (path arc) -->
  <circle cx="320" cy="320" r="255" fill="none" stroke="url(#arcGrad)" stroke-width="2" stroke-dasharray="18 10" opacity="0.5"/>

  <!-- Inner guide ring -->
  <circle cx="320" cy="320" r="190" fill="none" stroke="#4dd9c0" stroke-width="1" opacity="0.12"/>

  <!-- Compass rose: faint cardinal ticks -->
  <g stroke="#4dd9c0" stroke-width="2" opacity="0.25">
    <line x1="320" y1="120" x2="320" y2="148"/>
    <line x1="320" y1="492" x2="320" y2="520"/>
    <line x1="120" y1="320" x2="148" y2="320"/>
    <line x1="492" y1="320" x2="520" y2="320"/>
  </g>
  <!-- Diagonal ticks -->
  <g stroke="#4dd9c0" stroke-width="1.5" opacity="0.15">
    <line x1="185" y1="185" x2="203" y2="203"/>
    <line x1="455" y1="185" x2="437" y2="203"/>
    <line x1="185" y1="455" x2="203" y2="437"/>
    <line x1="455" y1="455" x2="437" y2="437"/>
  </g>

  <!-- ECG / heartbeat line (horizontal, through center) -->
  <!-- Glow layer -->
  <polyline points="108,320 192,320 218,320 232,268 250,372 268,320 292,320 308,290 320,350 332,320 360,320"
    fill="none" stroke="#4dd9c0" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"
    filter="url(#ambientGlow)" opacity="0.35"/>
  <!-- Main line -->
  <polyline points="108,320 192,320 218,320 232,268 250,372 268,320 292,320 308,290 320,350 332,320 360,320 532,320"
    fill="none" stroke="#4dd9c0" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>

  <!-- Compass needle — elongated diamond, north half amber, south half teal -->
  <!-- South (teal) half -->
  <path d="M320 320 L308 430 L320 500 L332 430 Z" fill="#4dd9c0" opacity="0.85" filter="url(#softGlow)"/>
  <!-- North (white→amber) half -->
  <path d="M320 320 L308 210 L320 130 L332 210 Z" fill="url(#needle)" filter="url(#softGlow)"/>

  <!-- Center circle -->
  <circle cx="320" cy="320" r="16" fill="#042f28" stroke="#4dd9c0" stroke-width="3" opacity="0.95"/>
  <circle cx="320" cy="320" r="7" fill="#4dd9c0" opacity="0.9"/>

  <!-- NORTH STAR — amber glowing dot (the destination, the goal) -->
  <!-- Big glow -->
  <circle cx="320" cy="118" r="30" fill="#f5a623" filter="url(#starGlow)" opacity="0.6"/>
  <!-- Main dot -->
  <circle cx="320" cy="118" r="18" fill="url(#amberGlow)"/>
  <!-- Bright core -->
  <circle cx="320" cy="118" r="8" fill="#fff9e6" opacity="0.95"/>

  <!-- Small cross sparkle on north star -->
  <g stroke="#ffd166" stroke-width="2.5" stroke-linecap="round" opacity="0.8">
    <line x1="320" y1="100" x2="320" y2="107"/>
    <line x1="320" y1="129" x2="320" y2="136"/>
    <line x1="302" y1="118" x2="309" y2="118"/>
    <line x1="331" y1="118" x2="338" y2="118"/>
  </g>

</svg>
